<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>散步賓果 Prototype</title>
    <style>
        :root { --primary: #333; --active: #ffdf00; }
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        /* 賓果外框 */
        .bingo-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 這裡可以改格數 */
            gap: 10px;
            max-width: 400px;
            margin: 20px auto;
        }
        /* 格子樣式 */
        .cell {
            aspect-ratio: 1;
            background: white;
            border: 2px solid var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            position: relative;
            padding: 5px;
            transition: 0.3s;
        }
        .cell.active { background: var(--active); font-weight: bold; }
        .cell.active::after {
            content: '⭕';
            position: absolute;
            font-size: 40px;
            opacity: 0.5;
        }
        .free-space { background: #eee; font-style: italic; }
    </style>
</head>
<body>

    <h1>🚶‍♂️ 散步賓果</h1>
    <p>模式：隨機城市</p>

    <div class="bingo-board" id="board">
        <!-- 格子會由 JS 產生 -->
    </div>

    <button onclick="resetBoard()">重新洗牌</button>

    <script>
        const items = ["郵筒", "貓", "狗", "沒戴安全帽阿伯", "外送員", "變電箱", "紅線違停", "建案廣告", "大榕樹", "垃圾車", "土地公廟", "飲料店", "這格算送你", "鐵捲門", "三角錐", "小發財車"];

        function createBoard(size = 4) {
            const board = document.getElementById('board');
            board.innerHTML = '';
            board.style.gridTemplateColumns = `repeat(${size}, 1fr)`;

            // 隨機排序
            const shuffled = items.sort(() => 0.5 - Math.random());

            for (let i = 0; i < size * size; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                // 設定中間格為 Free Space
                if (i === Math.floor((size * size) / 2)) {
                    cell.innerText = "⭐ 免費格";
                    cell.classList.add('free-space', 'active');
                } else {
                    cell.innerText = shuffled[i % items.length];
                    cell.onclick = function() {
                        this.classList.toggle('active');
                        checkWin(); // 這裡可以寫判斷連線的邏輯
                    };
                }
                board.appendChild(cell);
            }
        }

        function resetBoard() { createBoard(4); }
        function checkWin() { /* 連線邏輯實作區 */ }

        createBoard(4);
    </script>
</body>
</html>
