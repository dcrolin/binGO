<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>散步賓果 - 拍照功能版</title>
    <style>
        :root { --primary: #333; --active: #ffdf00; }
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        
        .bingo-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            max-width: 400px;
            margin: 20px auto;
        }
        
        .cell {
            aspect-ratio: 1;
            background: white;
            border: 2px solid var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            position: relative;
            padding: 5px;
            transition: 0.3s;
            /* 讓照片填滿格子，並加上一點半透明黑色遮罩讓字看得清楚 */
            background-size: cover;
            background-position: center;
        }
        
        /* 標記為找到的樣式 */
        .cell.active { 
            background-color: var(--active); 
            font-weight: bold; 
        }
        
        /* 當格子有照片時，讓文字變成白色並加上陰影 */
        .cell.has-photo {
            color: white;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
            border-color: #fff;
        }

        .free-space { background: #eee; font-style: italic; }
        
        /* 拍照按鈕 */
        .cam-btn {
            margin-top: 8px;
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            z-index: 2;
            background-color: rgba(255,255,255,0.7);
            border-radius: 5px;
        }
        .cell.has-photo .cam-btn {
            background-color: rgba(0,0,0,0.5); /* 有照片時按鈕變暗色 */
        }
    </style>
</head>
<body>

    <h1>🚶‍♂️ 散步賓果</h1>
    <p>模式：隨機城市</p>

    <div class="bingo-board" id="board">
        <!-- 格子會由 JS 產生 -->
    </div>

    <button onclick="resetBoard()" style="padding: 10px 20px; margin-top: 10px;">重新洗牌</button>

    <!-- 隱藏的相機呼叫器 (capture="environment" 代表預設開啟後置鏡頭) -->
    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

 <script>
    // 1. 物件庫 (未來可以根據模式動態載入這組 Array)
    const items = ["郵筒", "貓", "狗", "沒戴安全帽阿伯", "外送員", "變電箱", "紅線違停", "建案廣告", "大榕樹", "垃圾車", "土地公廟", "飲料店", "這格算送你", "鐵捲門", "三角錐", "小發財車"];

    let currentCell = null; 
    const cameraInput = document.getElementById('cameraInput');

    // 2. 相機監聽器：拍完照後的處理
    cameraInput.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file && currentCell) {
            const reader = new FileReader();
            reader.onload = function(event) {
                // 將照片設為背景，並加上深色遮罩確保文字清晰
                currentCell.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url(${event.target.result})`;
                currentCell.classList.add('has-photo');
                currentCell.classList.add('active'); // 拍照完自動標記完成
            };
            reader.readAsDataURL(file);
        }
        cameraInput.value = ''; 
    });

    // 3. 核心功能：產生賓果盤
    function createBoard(size = 4) {
        const board = document.getElementById('board');
        board.innerHTML = '';
        
        // 隨機打亂物件
        const shuffled = items.sort(() => 0.5 - Math.random());

        for (let i = 0; i < size * size; i++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            
            // 中間格設定
            if (i === Math.floor((size * size) / 2)) {
                cell.innerHTML = "<span>⭐ 免費格</span>";
                cell.classList.add('free-space', 'active');
            } else {
                // 建立文字標籤
                const textSpan = document.createElement('span');
                textSpan.innerText = shuffled[i % items.length];
                textSpan.style.pointerEvents = "none"; // 讓點擊直接穿透文字到格子上
                
                // 建立拍照按鈕
                const camBtn = document.createElement('button');
                camBtn.className = 'cam-btn';
                camBtn.innerText = '📷';
                
                // 點擊整個格子：切換完成狀態
                cell.onclick = function() {
                    this.classList.toggle('active');
                };

                // 點擊相機按鈕：開啟相機 (不觸發格子的 toggle)
                camBtn.onclick = function(event) {
                    event.stopPropagation(); // 阻止事件傳給 cell.onclick
                    currentCell = cell; 
                    cameraInput.click(); 
                };

                cell.appendChild(textSpan);
                cell.appendChild(camBtn);
            }
            board.appendChild(cell);
        }
    }

    function resetBoard() { createBoard(4); }

    // 初始化 4*4 盤面
    createBoard(4);
</script>
</body>
</html>
