<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>散步賓果 - 滿版大格子版</title>
    <style>
        :root { --primary: #222; --active: #ffdf00; --line: #ff4757; }
        
        /* 1. 移除外層空白，讓空間利用率達到 100% */
        body { 
            font-family: sans-serif; 
            text-align: center; 
            background: #fff; 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden; 
        }
        
        h1 { font-size: 1.2rem; margin: 10px 0; color: var(--primary); }

        .container { 
            position: relative; 
            width: 100vw; /* 滿版寬度 */
            max-width: 500px; /* 電腦版不至於太大 */
            margin: 0 auto; 
        }

        .bingo-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 2px; /* 極小間距 */
            background: var(--primary); /* 用背景色當作格線 */
            padding: 2px;
            position: relative;
            z-index: 1;
        }
        
        .cell {
            aspect-ratio: 1;
            background: #fff;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 11px; /* 稍微縮小字體確保不折行 */
            font-weight: bold;
            cursor: pointer; 
            position: relative; 
            overflow: hidden;
            background-size: cover; 
            background-position: center;
            padding: 2px;
            line-height: 1.2;
            word-break: break-all;
        }
        
        .cell.active { background-color: var(--active); }
        .cell.has-photo { color: white; text-shadow: 1px 1px 3px #000; }

        /* 2. 相機按鈕改到角落，不佔用中心文字空間 */
        .cam-btn { 
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 14px; 
            background: rgba(255,255,255,0.9); 
            border: 1px solid #ccc;
            border-radius: 3px; 
            padding: 2px; 
            z-index: 5;
            line-height: 1;
        }

        #line-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .bingo-line {
            stroke: var(--line);
            stroke-width: 5;
            stroke-linecap: round;
            opacity: 0.8;
            filter: drop-shadow(0 0 2px rgba(0,0,0,0.3));
        }

        .controls { padding: 15px; }
        button { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 25px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>🚶‍♂️ 散步賓果</h1>
    
    <div class="container">
        <div class="bingo-board" id="board"></div>
        <svg id="line-canvas"></svg>
    </div>

    <div class="controls">
        <button onclick="resetBoard()">重新洗牌 / 切換模式</button>
    </div>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

    <script>
        // 彰化在地特色物件庫 (精選 24 個彰化特產與街頭日常)
       const items = [
            "老屋鐵窗花", "斑駁紅磚牆", "磨石子地板/牆面", "老式木造拉門", 
            "木造老屋/青磚瓦片", "防盜碎玻璃圍牆", "騎樓燕子窩", "手寫毛筆字春聯", 
            "手繪防空洞指標", "宮廟石獅子", "老字號香舖/金紙店", "路邊小神龕/石香爐",
            "手寫體老招牌", "古早味柑仔店", "黑白照擋泥板女神", "廟宇剪黏/彩繪屋脊",
            "彰化客運老巴士", "MOOVO 橘色單車", "爌肉飯霓虹燈/招牌", "大佛路標指示",
            "古董級裁縫車(騎樓可見)", "復古毛玻璃窗(海棠花紋)", "彰化肉圓老店", "扇形車庫火車元素"
        ];

        let gridSize = 5;
        let currentCell = null;
        const cameraInput = document.getElementById('cameraInput');

        function createBoard() {
            const board = document.getElementById('board');
            const svg = document.getElementById('line-canvas');
            board.innerHTML = '';
            svg.innerHTML = ''; 
            
            const shuffled = [...items].sort(() => 0.5 - Math.random());
            const centerIndex = 12; 

            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if (i === centerIndex) {
                    cell.innerHTML = "<span style='font-size:20px'>⭐</span>";
                    cell.classList.add('active');
                } else {
                    const text = document.createElement('span');
                    text.innerText = shuffled[i > centerIndex ? i-1 : i];
                    text.style.pointerEvents = "none";
                    
                    const btn = document.createElement('button');
                    btn.className = 'cam-btn'; btn.innerText = '📷';
                    btn.onclick = (e) => { e.stopPropagation(); currentCell = cell; cameraInput.click(); };

                    cell.appendChild(text);
                    cell.appendChild(btn);
                    cell.onclick = function() { 
                        this.classList.toggle('active'); 
                        checkBingo(); 
                    };
                }
                board.appendChild(cell);
            }
        }

        function checkBingo() {
            const cells = document.querySelectorAll('.cell');
            const activeIndices = Array.from(cells).map(c => c.classList.contains('active'));
            const svg = document.getElementById('line-canvas');
            svg.innerHTML = ''; 

            const lines = [];
            for (let i = 0; i < 5; i++) {
                let row = [], col = [];
                for (let j = 0; j < 5; j++) {
                    row.push(i * 5 + j);
                    col.push(j * 5 + i);
                }
                if (row.every(idx => activeIndices[idx])) lines.push(row);
                if (col.every(idx => activeIndices[idx])) lines.push(col);
            }
            let d1 = [0,6,12,18,24], d2 = [4,8,12,16,20];
            if (d1.every(idx => activeIndices[idx])) lines.push(d1);
            if (d2.every(idx => activeIndices[idx])) lines.push(d2);

            lines.forEach(line => drawSvgLine(line));
        }

        function drawSvgLine(indices) {
            const svg = document.getElementById('line-canvas');
            const cells = document.querySelectorAll('.cell');
            const s = cells[indices[0]], e = cells[indices[indices.length-1]];
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", s.offsetLeft + s.offsetWidth/2);
            l.setAttribute("y1", s.offsetTop + s.offsetHeight/2);
            l.setAttribute("x2", e.offsetLeft + e.offsetWidth/2);
            l.setAttribute("y2", e.offsetTop + e.offsetHeight/2);
            l.setAttribute("class", "bingo-line");
            svg.appendChild(l);
        }

        cameraInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file && currentCell) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentCell.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.2), rgba(0,0,0,0.2)), url(${ev.target.result})`;
                    currentCell.classList.add('has-photo', 'active');
                    checkBingo();
                };
                reader.readAsDataURL(file);
            }
        };

        function resetBoard() { createBoard(); }
        createBoard();
    </script>
</body>
</html>
