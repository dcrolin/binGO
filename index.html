<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彰化賓果工業區</title>
    <!-- 引入外部可愛復古字體與圖標庫 (免費資源) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-creamy: #FDFBF7; /* 溫暖米白 */
            --primary-orange: #DB4A07; /* 磚泰紅 / 朱紅 */
            --active-yellow: #FFEAA7; /* 可愛手繪黃 */
            --line-green: #00B894; /* 復古青綠連線 */
            --text-dark: #331405; /* 深焦糖字體色 */
        }
        
        body { 
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; 
            text-align: center; 
            background: var(--bg-creamy); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            color: var(--text-dark);
        }
        
        /* 可愛復古風標題 */
        .header-zone {
            margin: 25px 0 15px 0;
        }
        h1 { 
            font-size: 1.6rem; 
            margin: 0;
            color: var(--primary-orange); 
            font-weight: 900;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        h1 i {
            font-size: 1.2rem;
            animation: walk 1.5s ease-in-out infinite alternate;
        }
        @keyframes walk {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-4px) rotate(5deg); }
        }

        .subtitle {
            font-size: 0.85rem;
            margin-top: 6px;
            color: var(--text-dark);
            opacity: 0.8;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container { 
            position: relative; 
            width: 92vw; 
            max-width: 460px; 
            margin: 0 auto; 
            background: var(--primary-orange);
            padding: 6px;
            border-radius: 20px; 
            box-shadow: 0 10px 0px rgba(219, 74, 7, 0.2), 0 15px 30px rgba(0,0,0,0.08);
        }

        /* 賓果盤 */
        .bingo-board { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 5px; 
            background: var(--primary-orange); 
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        /* 個別格子 */
        .cell { 
            aspect-ratio: 1; 
            background: var(--bg-creamy); 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            justify-content: center; 
            font-size: 10px; 
            font-weight: bold; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            background-size: cover; 
            background-position: center; 
            padding: 4px; 
            line-height: 1.3; 
            word-break: break-all;
            color: var(--primary-orange);
            transition: all 0.2s ease;
        }
        
        /* 格子內的小小可愛圖標 */
        .cell-icon {
            font-size: 16px;
            margin-bottom: 3px;
            opacity: 0.9;
        }
        
        /* 點選後的狀態 */
        .cell.active { 
            background-color: var(--active-yellow); 
            color: var(--text-dark);
        }
        .cell.active .cell-icon {
            color: var(--primary-orange);
        }
        
        /* 有照片時的視覺優化 */
        .cell.has-photo { 
            color: white; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9), 0px 0px 2px rgba(0,0,0,0.8); 
        }
        .cell.has-photo .cell-icon { display: none; } /* 有照片就藏起小icon以免凌亂 */
        
        /* Corner 相機按鈕可愛化 */
        .cam-btn { 
            position: absolute; 
            bottom: 4px; 
            right: 4px; 
            font-size: 11px; 
            background: var(--bg-creamy); 
            border: 1.5px solid var(--primary-orange); 
            border-radius: 6px; 
            padding: 4px; 
            z-index: 5; 
            line-height: 1;
            color: var(--primary-orange);
            box-shadow: 1px 1px 0px var(--primary-orange);
            transition: all 0.1s;
        }
        .cam-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 0px 0px 0px var(--primary-orange);
        }
        .cell.active .cam-btn {
            background: var(--active-yellow);
            color: var(--text-dark);
            border-color: var(--text-dark);
            box-shadow: 1px 1px 0px var(--text-dark);
        }

        /* SVG 連線畫布 */
        #line-canvas { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; 
            z-index: 10; 
        }

        /* 復古青綠劃記筆連線 */
        .bingo-line { 
            stroke: var(--line-green); 
            stroke-width: 7; 
            stroke-linecap: round; 
            opacity: 0.85; 
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 0.4s ease-out forwards;
        }

        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        .controls { padding: 25px 15px; }
        
        /* 復古圓潤按鈕 */
        button.reset-btn { 
            background: var(--primary-orange); 
            color: var(--bg-creamy); 
            border: none; 
            padding: 12px 32px; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 5px 0px #9E3200;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.1s;
        }
        button.reset-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px #9E3200;
        }
    </style>
</head>
<body>

    <div class="header-zone">
        <h1><i class="fa-solid fa-shoe-prints"></i> 彰化賓果工業區 </h1>
        <div class="subtitle">探索巷弄街道的常民工藝美學 🗺️</div>
    </div>
    
    <div class="container">
        <div class="bingo-board" id="board"></div>
        <svg id="line-canvas"></svg>
    </div>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

    <script>
        // 帶有相對應可愛內建小圖標(icon)的彰化物件庫
        const items = [
            { text: "老屋鐵窗花", icon: "fa-border-all" },
            { text: "斑駁紅磚牆", icon: "fa-cubes" },
            { text: "磨石子地板", icon: "fa-border-top-left" },
            { text: "老式木造拉門", icon: "fa-door-open" },
            { text: "木造老屋", icon: "fa-house-chimney-window" },
            { text: "碎玻璃圍牆", icon: "fa-burst" },
            { text: "騎樓燕子窩", icon: "fa-crow" },
            { text: "手寫毛筆春聯", icon: "fa-pen-brush" },
            { text: "手繪防空洞", icon: "fa-person-shelter" },
            { text: "宮廟石獅子", icon: "fa-cat" },
            { text: "老字號香舖", icon: "fa-fire" },
            { text: "路邊小神龕", icon: "fa-gopuram" },
            { text: "手寫體老招牌", icon: "fa-heading" },
            { text: "古早味柑仔店", icon: "fa-shop" },
            { text: "擋泥板女神", icon: "fa-motorcycle" },
            { text: "廟宇剪黏", icon: "fa-palette" },
            { text: "彰化客運", icon: "fa-bus" },
            { text: "MOOVO單車", icon: "fa-bicycle" },
            { text: "爌肉飯招牌", icon: "fa-bowl-rice" },
            { text: "大佛路標指示", icon: "fa-map-signs" },
            { text: "古董裁縫車", icon: "fa-scissors" },
            { text: "海棠花玻璃", icon: "fa-snowflake" },
            { text: "彰化肉圓老店", icon: "fa-cookie" },
            { text: "扇形車庫火車", icon: "fa-train" }
        ];

        let gridSize = 5;
        let currentCell = null;
        const cameraInput = document.getElementById('cameraInput');

        function createBoard() {
            const board = document.getElementById('board');
            const svg = document.getElementById('line-canvas');
            board.innerHTML = '';
            svg.innerHTML = ''; 
            
            const shuffled = [...items].sort(() => 0.5 - Math.random());
            const centerIndex = 12; 

            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if (i === centerIndex) {
                    cell.innerHTML = "<span style='font-size:22px; margin-bottom:2px;'>抵達彰化</span><span style='font-size:9px; font-weight:900; letter-spacing:1px;'>START</span>";
                    cell.classList.add('active');
                    cell.style.backgroundColor = "var(--active-yellow)";
                } else {
                    const itemData = shuffled[i > centerIndex ? i-1 : i];
                    
                    // 建立可愛圖標
                    const iconEl = document.createElement('i');
                    iconEl.className = `fa-solid ${itemData.icon} cell-icon`;
                    
                    // 建立文字
                    const textSpan = document.createElement('span');
                    textSpan.innerText = itemData.text;
                    textSpan.style.pointerEvents = "none";
                    
                    // 建立相機按鈕
                    const btn = document.createElement('button');
                    btn.className = 'cam-btn'; 
                    btn.innerHTML = '<i class="fa-solid fa-camera"></i>';
                    btn.onclick = (e) => { e.stopPropagation(); currentCell = cell; cameraInput.click(); };

                    cell.appendChild(iconEl);
                    cell.appendChild(textSpan);
                    cell.appendChild(btn);
                    
                    cell.onclick = function() { 
                        this.classList.toggle('active'); 
                        checkBingo(); 
                    };
                }
                board.appendChild(cell);
            }
        }

        function checkBingo() {
            const cells = document.querySelectorAll('.cell');
            const activeIndices = Array.from(cells).map(c => c.classList.contains('active'));
            const svg = document.getElementById('line-canvas');
            svg.innerHTML = ''; 

            const lines = [];
            for (let i = 0; i < 5; i++) {
                let row = [], col = [];
                for (let j = 0; j < 5; j++) {
                    row.push(i * 5 + j);
                    col.push(j * 5 + i);
                }
                if (row.every(idx => activeIndices[idx])) lines.push(row);
                if (col.every(idx => activeIndices[idx])) lines.push(col);
            }
            let d1 = [0,6,12,18,24], d2 = [4,8,12,16,20];
            if (d1.every(idx => activeIndices[idx])) lines.push(d1);
            if (d2.every(idx => activeIndices[idx])) lines.push(d2);

            lines.forEach(line => drawSvgLine(line));
        }

        function drawSvgLine(indices) {
            const svg = document.getElementById('line-canvas');
            const cells = document.querySelectorAll('.cell');
            const s = cells[indices[0]], e = cells[indices[indices.length-1]];
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", s.offsetLeft + s.offsetWidth/2);
            l.setAttribute("y1", s.offsetTop + s.offsetHeight/2);
            l.setAttribute("x2", e.offsetLeft + e.offsetWidth/2);
            l.setAttribute("y2", e.offsetTop + e.offsetHeight/2);
            l.setAttribute("class", "bingo-line");
            svg.appendChild(l);
        }

        cameraInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file && currentCell) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentCell.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url(${ev.target.result})`;
                    currentCell.classList.add('has-photo', 'active');
                    checkBingo();
                };
                reader.readAsDataURL(file);
            }
        };

        function resetBoard() { createBoard(); }
        createBoard();
    </script>
</body>
</html>
