<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彰化舊城散步賓果</title>
    <style>
        :root { 
            --bg-creamy: #FDFBF7; /* 溫暖米白 */
            --primary-orange: #DB4A07; /* 磚泰紅 / 朱紅 */
            --active-yellow: #FFEAA7; /* 可愛手繪黃 */
            --line-green: #00B894; /* 復古青綠連線 */
            --text-dark: #331405; /* 深焦糖字體色 */
        }
        
        body { 
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; 
            text-align: center; 
            background: var(--bg-creamy); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            color: var(--text-dark);
        }
        
        /* 可愛復古風標題 */
        h1 { 
            font-size: 1.5rem; 
            margin: 20px 0 10px 0; 
            color: var(--primary-orange); 
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 1px 1px 0px var(--bg-creamy), 2px 2px 0px rgba(219, 74, 7, 0.2);
        }

        .subtitle {
            font-size: 0.85rem;
            margin-bottom: 20px;
            color: var(--text-dark);
            opacity: 0.8;
            font-weight: bold;
        }

        .container { 
            position: relative; 
            width: 92vw; /* 稍微留一點邊緣，像卡片一樣可愛 */
            max-width: 460px; 
            margin: 0 auto; 
            background: var(--primary-orange);
            padding: 4px;
            border-radius: 16px; /* 圓角可愛風 */
            box-shadow: 0 8px 0px rgba(219, 74, 7, 0.15), 0 12px 24px rgba(0,0,0,0.08);
        }

        /* 賓果盤 */
        .bingo-board { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 4px; 
            background: var(--primary-orange); 
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        /* 個別格子 */
        .cell { 
            aspect-ratio: 1; 
            background: var(--bg-creamy); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 11px; 
            font-weight: bold; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            background-size: cover; 
            background-position: center; 
            padding: 4px; 
            line-height: 1.3; 
            word-break: break-all;
            color: var(--primary-orange);
            transition: all 0.2s ease;
        }
        
        /* 點選後的可愛黃色 */
        .cell.active { 
            background-color: var(--active-yellow); 
            color: var(--text-dark);
        }
        
        /* 有照片時的視覺優化 */
        .cell.has-photo { 
            color: white; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9), 0px 0px 2px rgba(0,0,0,0.8); 
        }
        
        /* Corner 相機按鈕可愛化 */
        .cam-btn { 
            position: absolute; 
            bottom: 4px; 
            right: 4px; 
            font-size: 12px; 
            background: var(--bg-creamy); 
            border: 1.5px solid var(--primary-orange); 
            border-radius: 6px; 
            padding: 3px; 
            z-index: 5; 
            line-height: 1;
            box-shadow: 1px 1px 0px var(--primary-orange);
            transition: transform 0.1s;
        }
        .cam-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 0px 0px 0px var(--primary-orange);
        }
        .cell.active .cam-btn {
            background: var(--active-yellow);
        }

        /* SVG 連線畫布 */
        #line-canvas { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; 
            z-index: 10; 
        }

        /* 復古青綠劃記筆連線 */
        .bingo-line { 
            stroke: var(--line-green); 
            stroke-width: 6; 
            stroke-linecap: round; 
            opacity: 0.85; 
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 0.4s ease-out forwards;
        }

        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        .controls { padding: 25px; }
        
        /* 復古圓潤按鈕 */
        button.reset-btn { 
            background: var(--primary-orange); 
            color: var(--bg-creamy); 
            border: none; 
            padding: 12px 28px; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 0.95rem;
            letter-spacing: 1px;
            box-shadow: 0 4px 0px #9E3200;
            cursor: pointer;
            transition: all 0.1s;
        }
        button.reset-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0px #9E3200;
        }
    </style>
</head>
<body>

    <h1>彰化舊城散步賓果</h1>
    <div class="subtitle">🚶‍♂️ 尋找街道上的老城故事 🚶‍♀️</div>
    
    <div class="container">
        <div class="bingo-board" id="board"></div>
        <svg id="line-canvas"></svg>
    </div>

    <div class="controls">
        <button class="reset-btn" onclick="resetBoard()">重新洗牌 🔄</button>
    </div>

    <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">

    <script>
        const items = [
             "鐵窗花", "紅磚牆", "平交道/鐵軌", "吉祥物半半", 

            "老屋", "碎玻璃圍牆", "騎樓燕子窩", "手寫毛筆春聯", 

            "防空洞指標", "宮廟石獅子", "老字號香舖", "「彰」",

            "手寫體老招牌", "古早味柑仔店", "藍黃紅布告欄", "小貓",

            "彰化客運", "MOOVO單車", "爌肉飯招牌", "大佛",

            "大排水溝", "海棠花毛玻璃", "肉圓老店", "眷村" 
        ];

        let gridSize = 5;
        let currentCell = null;
        const cameraInput = document.getElementById('cameraInput');

        function createBoard() {
            const board = document.getElementById('board');
            const svg = document.getElementById('line-canvas');
            board.innerHTML = '';
            svg.innerHTML = ''; 
            
            const shuffled = [...items].sort(() => 0.5 - Math.random());
            const centerIndex = 12; 

            for (let i = 0; i < 25; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                
                if (i === centerIndex) {
                    cell.innerHTML = "<span style='font-size:18px;'>🏮</span><br><span style='font-size:9px; opacity:0.8; margin-top:2px;'>首頁</span>";
                    cell.classList.add('active');
                    cell.style.backgroundColor = "var(--active-yellow)";
                } else {
                    const text = document.createElement('span');
                    text.innerText = shuffled[i > centerIndex ? i-1 : i];
                    text.style.pointerEvents = "none";
                    
                    const btn = document.createElement('button');
                    btn.className = 'cam-btn'; btn.innerText = '📷';
                    btn.onclick = (e) => { e.stopPropagation(); currentCell = cell; cameraInput.click(); };

                    cell.appendChild(text);
                    cell.appendChild(btn);
                    cell.onclick = function() { 
                        this.classList.toggle('active'); 
                        checkBingo(); 
                    };
                }
                board.appendChild(cell);
            }
        }

        function checkBingo() {
            const cells = document.querySelectorAll('.cell');
            const activeIndices = Array.from(cells).map(c => c.classList.contains('active'));
            const svg = document.getElementById('line-canvas');
            svg.innerHTML = ''; 

            const lines = [];
            for (let i = 0; i < 5; i++) {
                let row = [], col = [];
                for (let j = 0; j < 5; j++) {
                    row.push(i * 5 + j);
                    col.push(j * 5 + i);
                }
                if (row.every(idx => activeIndices[idx])) lines.push(row);
                if (col.every(idx => activeIndices[idx])) lines.push(col);
            }
            let d1 = [0,6,12,18,24], d2 = [4,8,12,16,20];
            if (d1.every(idx => activeIndices[idx])) lines.push(d1);
            if (d2.every(idx => activeIndices[idx])) lines.push(d2);

            lines.forEach(line => drawSvgLine(line));
        }

        function drawSvgLine(indices) {
            const svg = document.getElementById('line-canvas');
            const cells = document.querySelectorAll('.cell');
            const s = cells[indices[0]], e = cells[indices[indices.length-1]];
            const l = document.createElementNS("http://www.w3.org/2000/svg", "line");
            l.setAttribute("x1", s.offsetLeft + s.offsetWidth/2);
            l.setAttribute("y1", s.offsetTop + s.offsetHeight/2);
            l.setAttribute("x2", e.offsetLeft + e.offsetWidth/2);
            l.setAttribute("y2", e.offsetTop + e.offsetHeight/2);
            l.setAttribute("class", "bingo-line");
            svg.appendChild(l);
        }

        cameraInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file && currentCell) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    currentCell.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.35), rgba(0,0,0,0.35)), url(${ev.target.result})`;
                    currentCell.classList.add('has-photo', 'active');
                    checkBingo();
                };
                reader.readAsDataURL(file);
            }
        };

        function resetBoard() { createBoard(); }
        createBoard();
    </script>
</body>
</html>
