<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>彰化賓果工業區！</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --bg-creamy: #FDFBF7; /* 溫暖米白 */
            --primary-orange: #DB4A07; /* 磚泰紅 / 朱紅 */
            --active-yellow: #FFEAA7; /* 可愛手繪黃 */
            --line-green: #00B894; /* 復古青綠連線 */
            --text-dark: #333333; /* 質感深炭灰 */
        }
        
        body { 
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; 
            text-align: center; 
            background: var(--bg-creamy); 
            margin: 0; 
            padding: 0; 
            overflow-x: hidden;
            color: var(--text-dark);
        }
        
        /* 可愛復古風標題 */
        .header-zone {
            margin: 25px 0 15px 0;
        }
        h1 { 
            font-size: 1.6rem; 
            margin: 0;
            color: var(--primary-orange); 
            font-weight: 900;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        h1 i {
            font-size: 1.2rem;
            animation: walk 1.5s ease-in-out infinite alternate;
        }
        @keyframes walk {
            0% { transform: translateY(0) rotate(-5deg); }
            100% { transform: translateY(-4px) rotate(5deg); }
        }

        .subtitle {
            font-size: 0.85rem;
            margin-top: 6px;
            color: var(--text-dark);
            opacity: 0.8;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container { 
            position: relative; 
            width: 92vw; 
            max-width: 460px; 
            margin: 0 auto; 
            background: var(--primary-orange);
            padding: 3px; /* 4px 細大框 */
            border-radius: 16px; 
            box-shadow: 0 6px 0px rgba(219, 74, 7, 0.2), 0 12px 24px rgba(0,0,0,0.08);
        }

        /* 賓果盤 */
        .bingo-board { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 5px; 
            background: var(--primary-orange); 
            border-radius: 14px;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        /* --- 修正後的個別格子樣式 (上下平分，字不被擋) --- */
        .cell { 
            aspect-ratio: 1; 
            background: var(--bg-creamy); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            font-size: 10.5px; 
            font-weight: bold; 
            cursor: pointer; 
            position: relative; 
            overflow: hidden; 
            background-size: cover; 
            background-position: center; 
            padding: 6px 4px 4px 4px; 
            line-height: 1.2; 
            word-break: break-all;
            color: var(--primary-orange);
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .cell span {
            width: 100%;
            display: block;
            text-align: center;
        }
        
        .cell-icon {
            font-size: 14px;
            margin-bottom: 2px;
            opacity: 0.9;
        }
        
        .cell.active { 
            background-color: var(--active-yellow); 
            color: var(--text-dark);
        }
        .cell.active .cell-icon {
            color: var(--primary-orange);
        }
        
        .cell.has-photo { 
            color: white; 
            text-shadow: 1px 1px 4px rgba(0,0,0,0.9), 0px 0px 2px rgba(0,0,0,0.8); 
        }
        .cell.has-photo .cell-icon { display: none; }
        
        /* 相機按鈕：細框線深灰色橫條 */
        .cam-btn { 
            position: relative; 
            bottom: 0;
            right: 0;
            width: 85%; 
            font-size: 10px; 
            background: var(--bg-creamy); 
            border: 1px solid var(--text-dark); /* 深灰 1px 細線邊框 */
            border-radius: 4px; 
            padding: 1px 0; 
            z-index: 5; 
            line-height: 1;
            color: var(--text-dark); /* 深灰色圖案 */
            box-shadow: 1px 1px 0px var(--text-dark); /* 深灰色 1px 細立體陰影 */
            transition: all 0.1s;
            margin-top: auto; 
        }
        .cam-btn:active {
            transform: translate(1px, 1px);
            box-shadow: 0px 0px 0px var(--text-dark);
        }
        .cell.active .cam-btn {
            background: var(--bg-creamy);
            color: var(--text-dark);
            border-color: var(--text-dark);
            box-shadow: 1px 1px 0px var(--text-dark);
        }

        /* SVG 連線畫布 */
        #line-canvas { 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; 
            z-index: 10; 
        }

        /* 復古青綠劃記筆連線 */
        .bingo-line { 
            stroke: var(--line-green); 
            stroke-width: 7; 
            stroke-linecap: round; 
            opacity: 0.85; 
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawLine 0.4s ease-out forwards;
        }

        @keyframes drawLine { to { stroke-dashoffset: 0; } }

        .controls { padding: 25px 15px; }
        
        /* 復古圓潤按鈕 */
        button.reset-btn { 
            background: var(--primary-orange); 
            color: var(--bg-creamy); 
            border: none; 
            padding: 12px 32px; 
            border-radius: 30px; 
            font-weight: bold; 
            font-size: 1rem;
            letter-spacing: 1px;
            box-shadow: 0 5px 0px #9E3200;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.1s;
        }
        button.reset-btn:active {
            transform: translateY(5px);
            box-shadow: 0 0px 0px #9E3200;
        }
    </style>
</head>
<body>

    <div class="header-zone">
        <h1><i class="fa-solid fa-shoe-prints"></i> 彰化賓果工業區</h1>
        <div class="subtitle">慢慢散步吧！</div>
    </div>
    
    <div class="container">
        <div class="bingo
